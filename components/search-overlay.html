<div id="search-overlay" class="search-overlay" role="dialog" aria-modal="true" aria-label="Поиск по странице" aria-hidden="true">
  <div class="search-overlay-backdrop" id="search-overlay-backdrop"></div>
  <div class="search-overlay-panel">
    <div class="search-overlay-bar">
      <input
        type="search"
        id="search-input"
        class="search-input"
        placeholder="Поиск по странице…"
        autocomplete="off"
        aria-label="Текст для поиска"
      />
      <div class="search-overlay-controls">
        <span id="search-counter" class="search-counter" aria-live="polite">0 из 0</span>
        <button type="button" class="search-btn search-btn-prev" id="search-prev" aria-label="Предыдущее совпадение" disabled>↑</button>
        <button type="button" class="search-btn search-btn-next" id="search-next" aria-label="Следующее совпадение" disabled>↓</button>
        <button type="button" class="search-btn search-btn-close" id="search-close" aria-label="Закрыть поиск">×</button>
      </div>
    </div>
  </div>
</div>
